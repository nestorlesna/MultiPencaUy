<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Fondo circular -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" filter="url(#shadow)"/>

  <g transform="translate(0,-16)" filter="url(#shadow)">
    <!-- asas de la copa -->
    <path d="M160,160 Q88,160 96,232 Q104,296 176,296" fill="none" stroke="url(#gold)" stroke-width="24" stroke-linecap="round"/>
    <path d="M352,160 Q424,160 416,232 Q408,296 336,296" fill="none" stroke="url(#gold)" stroke-width="24" stroke-linecap="round"/>

    <!-- copa -->
    <path d="M168,136 H344 L328,256 Q320,328 256,328 Q192,328 184,256 Z" fill="url(#gold)"/>
    <rect x="156" y="120" width="200" height="32" rx="12" fill="#FCD34D"/>

    <!-- pie y base -->
    <rect x="236" y="328" width="40" height="48" fill="url(#gold)"/>
    <path d="M184,384 H328 L312,424 H200 Z" fill="url(#gold)"/>
    <rect x="168" y="424" width="176" height="32" rx="12" fill="#D97706"/>

    <!-- estrella -->
    <path d="M256,176 L266.4,203.2 L296,204.8 L272.8,223.2 L280.8,251.2 L256,234.4 L231.2,251.2 L239.2,223.2 L216,204.8 L245.6,203.2 Z" fill="#1E2535"/>
  </g>
</svg>
